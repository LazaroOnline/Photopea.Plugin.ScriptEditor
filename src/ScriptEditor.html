<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Photopea Script Editor</title>
	<link rel="icon" type="image/x-icon" href="Icon.png">
	<link href="styles.css" rel="stylesheet" />
</head>


<body>

<div id="toolbar">
	<button id="run" title="Ctrl+Enter">Run</button>
	<button id="save" title="Ctrl+S">Save</button>
	<button id="load" title="Ctrl+O">Load</button>
	<input id="fileInput" type="file" accept=".txt,.js,.jsx,.jsxbin" hidden>

	<div class="dropdown">
		<button class="dropbtn">Demos ▾</button>
		<div class="dropdown-content">
			<button class="dropdown-item" id="demo-hello">Hello</button>
			<button class="dropdown-item" id="demo-process-layers">Process Layers</button>
			<button class="dropdown-item" id="demo-clone-layers">Clone Layers</button>
		</div>
	</div>
</div>

<div id="editor"></div>
<div id="dropZone"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.52.0/min/vs/loader.min.js"></script>
<script src="script.js"></script>

</body>
</html>
