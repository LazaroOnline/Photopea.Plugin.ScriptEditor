<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Photopea Script Editor</title>
	<link rel="icon" type="image/x-icon" href="Icon.png">
	<link href="styles.css" rel="stylesheet" />
</head>


<body>

<div id="toolbar">
	<button id="btn-run" title="Ctrl+Enter"><span class="play-icon">▶</span> Run</button>
	<div style="display: flex;">
		<button id="btn-save" class="btn-dropdown-main" title="Ctrl+S">Save</button>
		<div class="dropdown">
			<button class="btn-dropdown-side">▾</button>
			<div class="dropdown-content">
				<button id="btn-save-as" class="dropdown-item" title="Ctrl+Shift+S">Save As...</button>
			</div>
		</div>
	</div>
	<button id="btn-load" title="Ctrl+O">Load</button>
	<input id="fileInput" type="file" accept=".txt,.js,.jsx,.jsxbin" hidden>

	<div class="dropdown">
		<button class="dropbtn">Demos ▾</button>
		<div class="dropdown-content">
			<button class="dropdown-item" id="btn-demo-hello">Hello</button>
			<button class="dropdown-item" id="btn-demo-process-layers">Process Layers</button>
			<button class="dropdown-item" id="btn-demo-clone-layers">Clone Layers</button>
		</div>
	</div>
</div>
<div>
	<div id="filename" class="tab-name"></div>
</div>

<div id="editor"></div>
<div id="dropZone"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.53.0/min/vs/loader.min.js"></script>
<script src="script.js"></script>

</body>
</html>
