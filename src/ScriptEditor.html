<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Photopea Script Editor</title>
	<link rel="icon" type="image/x-icon" href="Icon.png">
	<link href="styles.css" rel="stylesheet" />
</head>


<body>

<header class="toolbar">
	<button id="btn-run" class="primary" title="Run (Ctrl+Enter)">
		<span class="play-icon">▶</span>
		<span class="text md">Run</span>
	</button>
	
	<div class="split-button">
		<button class="split-main" id="btn-save" title="Save (Ctrl+S)" aria-label="Save">
			<div class="icon xs icon-save"><!--💾--></div>
			<span class="text md">Save</span>
		</button>
		<div class="dropdown">
			<button class="split-chevron dropdown-trigger" aria-label="More save options">▾</button>
			<div class="dropdown-menu dropdown-menu-right">
				<button class="dropdown-item" id="btn-save-as" title="Save as (Ctrl+Shift+S)">Save As…</button>
			</div>
		</div>
	</div>

	<button id="btn-load" title="Load (Ctrl+O)" aria-label="Load">
		<div class="icon xs icon-load"><!--📥--></div>
		<span class="text md">Load</span>
	</button>
	<input id="fileInput" type="file" multiple accept=".txt,.js,.jsx,.jsxbin" hidden>

	<div class="dropdown">
		<button class="dropdown-trigger">
			Demos <spam class="chevron">▾</spam>
		</button>
		<div class="dropdown-menu">
			<button class="dropdown-item" id="btn-demo-hello">Hello</button>
			<button class="dropdown-item" id="btn-demo-process-layers">Process Layers</button>
			<button class="dropdown-item" id="btn-demo-clone-layers">Clone Layers</button>
		</div>
	</div>

	<div class="dropdown">
		<button class="dropdown-trigger">☰</button>
		<div class="dropdown-menu">
			<a target="blank" draggable="false" href="https://github.com/LazaroOnline/Photopea.Plugin.ScriptEditor">
				<button class="dropdown-item">
					<span>Github</span>
					<svg class="github-icon" height="17" width="17" viewBox="0 0 16 16" style="fill:rgb(200, 200, 200)">
						<path fill-rule="evenodd" d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0 0 16 8c0-4.42-3.58-8-8-8z"></path>
					</svg>
				</button>
			</a>
			<a target="blank" draggable="false" href="https://github.com/LazaroOnline/Photopea.Plugin.ScriptEditor/issues">
				<button class="dropdown-item">Report an issue</button>
			</a>
			<button class="dropdown-item" id="btn-word-wrap-toggle" title="Toggle word wrap" aria-label="Toggle word wrap">
				Word wrap
				<div class="word-wrap-tick">
					<!-- v V ✓ ☑ ✔️✅-->
					<svg height="10px" width="10px" fill="none" stroke-width="1.35" stroke="currentColor"><path d="M 1 5 L 4 8 L 9 2"></path></svg>
				</div>
			</button>
			<a target="blank" draggable="false" href="https://github.com/Adobe-CEP/CEP-Resources/blob/master/Documentation/Product%20specific%20Documentation/Photoshop%20Scripting/photoshop-javascript-ref-2020.pdf">
				<button class="dropdown-item">JS Reference</button>
			</a>
			
		</div>
	</div>

</header>

<div class="tab-bar">
	<div class="tabs" id="tabs"></div>
	<button id="btn-new-tab" title="New file (Ctrl+Alt+N)">+</button>
</div>

<template id="template-tab">
	<div class="tab" title="">
		<span class="tab-dot"></span>
		<span class="tab-label"></span>
		<button type="button" class="tab-close" title="Close (Ctrl+Alt+W)" aria-label="Close tab">×</button>
	</div>
</template>

<div id="editor"></div>
<div id="dropZone"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.52.0/min/vs/loader.min.js"></script>
<script src="script.js"></script>

</body>
</html>
